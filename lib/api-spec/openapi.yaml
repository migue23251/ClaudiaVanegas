openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Claudia Vanegas POS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: products
  - name: variants
  - name: customers
  - name: suppliers
  - name: purchaseOrders
  - name: accountsPayable
  - name: sales
  - name: accountsReceivable
  - name: dashboard
  - name: reports
  - name: settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # ─── USERS ───────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PRODUCTS ────────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
            enum: [blusas, jeans, vestidos, conjuntos, faldas, chaquetas, zapatos, bolsos, accesorios]
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}/movements:
    get:
      operationId: getProductMovements
      tags: [products]
      summary: Get the entry/exit movement history (kardex) for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product movement history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductMovements"
        "404":
          description: Not found

  /products/{id}/supplier:
    get:
      operationId: getProductSupplier
      tags: [products]
      summary: Get the most recent supplier that has sold this product (from purchase order history)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Most recent supplier for this product, or null if it has never been purchased
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Supplier"
                  - type: "null"
        "404":
          description: Not found

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/visibility:
    patch:
      operationId: setProductVisibility
      tags: [products]
      summary: Show or hide a product in the public catalog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVisibilityInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  # ─── VARIANTS ────────────────────────────────────────────────────────────────
  /products/{id}/variants:
    post:
      operationId: createProductVariant
      tags: [variants]
      summary: Add a new color/size variant to a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"
        "404":
          description: Not found

  /products/{id}/variants/{variantId}:
    put:
      operationId: updateProductVariant
      tags: [variants]
      summary: Update a product variant (stock, images, color, size)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"
        "404":
          description: Not found
    delete:
      operationId: deleteProductVariant
      tags: [variants]
      summary: Delete a product variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── CUSTOMERS ───────────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── SUPPLIERS ───────────────────────────────────────────────────────────────
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get a supplier by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PURCHASE ORDERS ─────────────────────────────────────────────────────────
  /purchase-orders:
    get:
      operationId: listPurchaseOrders
      tags: [purchaseOrders]
      summary: List all purchase orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, partial, received, cancelled]
        - name: supplierId
          in: query
          schema:
            type: integer
        - name: supplierSearch
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of purchase orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
    post:
      operationId: createPurchaseOrder
      tags: [purchaseOrders]
      summary: Create a purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /purchase-orders/{id}:
    get:
      operationId: getPurchaseOrder
      tags: [purchaseOrders]
      summary: Get a purchase order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "404":
          description: Not found
    put:
      operationId: updatePurchaseOrder
      tags: [purchaseOrders]
      summary: Update a purchase order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Cannot be edited or cancelled in its current state

  /purchase-orders/{id}/receive:
    post:
      operationId: receivePurchaseOrder
      tags: [purchaseOrders]
      summary: Receive merchandise (partial or full) for a purchase order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveOrderInput"
      responses:
        "200":
          description: Updated purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  # ─── ACCOUNTS PAYABLE ────────────────────────────────────────────────────────
  /accounts-payable:
    get:
      operationId: listAccountsPayable
      tags: [accountsPayable]
      summary: List all accounts payable
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, partial, paid]
      responses:
        "200":
          description: List of accounts payable
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountPayable"
    post:
      operationId: createFixedExpense
      tags: [accountsPayable]
      summary: Create a manual/fixed-expense account payable not tied to a purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FixedExpenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPayable"

  /accounts-payable/{id}/status:
    patch:
      operationId: updateAccountPayableStatus
      tags: [accounts-payable]
      summary: Update status and due date of an accounts payable record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountPayableStatusUpdate"
      responses:
        "200":
          description: Updated record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPayable"

  /accounts-payable/{id}:
    get:
      operationId: getAccountPayable
      tags: [accountsPayable]
      summary: Get accounts payable by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account payable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPayable"
        "404":
          description: Not found

  /accounts-payable/{id}/payments:
    post:
      operationId: createApPayment
      tags: [accountsPayable]
      summary: Register a payment for accounts payable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPayable"

  # ─── SALES ───────────────────────────────────────────────────────────────────
  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List all sales/invoices
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
        - name: paymentType
          in: query
          schema:
            type: string
            enum: [contado, credito]
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sale (checkout from POS)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleInput"
      responses:
        "201":
          description: Sale created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Get a sale by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "404":
          description: Not found

  /sales/{id}/payment-type:
    patch:
      operationId: updateSalePaymentType
      tags: [sales]
      summary: Change the payment method of a sale (admin only, not allowed when Bold link is paid or sale is voided)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSalePaymentTypeInput"
      responses:
        "200":
          description: Updated sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "400":
          description: Cannot change payment type (voided or Bold link paid)
        "404":
          description: Not found

  /sales/{id}/void:
    post:
      operationId: voidSale
      tags: [sales]
      summary: Void/annul a sale, restoring stock and reversing any related debt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoidSaleInput"
      responses:
        "200":
          description: Sale voided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "400":
          description: Invalid request or sale already voided
        "404":
          description: Not found

  # ─── ACCOUNTS RECEIVABLE ─────────────────────────────────────────────────────
  /accounts-receivable:
    get:
      operationId: listAccountsReceivable
      tags: [accountsReceivable]
      summary: List all accounts receivable
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, partial, paid]
        - name: overdue
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of accounts receivable
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountReceivable"

  /accounts-receivable/{id}:
    get:
      operationId: getAccountReceivable
      tags: [accountsReceivable]
      summary: Get accounts receivable by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account receivable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountReceivable"
        "404":
          description: Not found

  /accounts-receivable/{id}/payments:
    post:
      operationId: createArPayment
      tags: [accountsReceivable]
      summary: Register a payment for accounts receivable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountReceivable"

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Monthly dashboard summary (totals, counts)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/billing-vs-collection:
    get:
      operationId: getDashboardBillingVsCollection
      tags: [dashboard]
      summary: Monthly billing vs. collection comparison chart data
      parameters:
        - name: from
          in: query
          description: Start date (ISO 8601, e.g. 2025-01-01)
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: End date (ISO 8601, e.g. 2025-12-31)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Billing vs. collection data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingVsCollectionPoint"

  /dashboard/sales-by-category:
    get:
      operationId: getDashboardSalesByCategory
      tags: [dashboard]
      summary: Sales totals grouped by product category
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sales by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesByCategoryPoint"

  /dashboard/payment-type-breakdown:
    get:
      operationId: getDashboardPaymentTypeBreakdown
      tags: [dashboard]
      summary: Sales breakdown by payment type
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Payment type breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentTypePoint"

  /dashboard/inventory-cost-by-category:
    get:
      operationId: getDashboardInventoryCostByCategory
      tags: [dashboard]
      summary: Current inventory cost grouped by category
      responses:
        "200":
          description: Inventory cost by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryCostPoint"

  /dashboard/expenses-vs-income:
    get:
      operationId: getDashboardExpensesVsIncome
      tags: [dashboard]
      summary: Monthly expenses (purchase orders) vs income (cash + AR payments)
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Expenses vs income data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpensesVsIncomePoint"

  /dashboard/top-products:
    get:
      operationId: getDashboardTopProducts
      tags: [dashboard]
      summary: Top selling products (by variant when applicable)
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/net-profit-trend:
    get:
      operationId: getDashboardNetProfitTrend
      tags: [dashboard]
      summary: Monthly net profit trend (income minus purchase expenses)
      parameters:
        - name: from
          in: query
          description: Start date (ISO 8601, e.g. 2025-01-01)
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: End date (ISO 8601, e.g. 2025-12-31)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Net profit trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetProfitTrendPoint"

  /dashboard/slow-moving-products:
    get:
      operationId: getDashboardSlowMovingProducts
      tags: [dashboard]
      summary: Products/variants with low turnover (slow-moving inventory)
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Slow moving products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SlowMovingProduct"

  # ─── REPORTS ─────────────────────────────────────────────────────────────────
  /reports/sales-by-month:
    get:
      operationId: getReportSalesByMonth
      tags: [reports]
      summary: Sales totals grouped by month
      parameters:
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Sales by month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesByMonthPoint"

  /reports/sales-by-category:
    get:
      operationId: getReportSalesByCategory
      tags: [reports]
      summary: Sales totals grouped by product category
      responses:
        "200":
          description: Sales by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesByCategoryPoint"

  /reports/payment-type-breakdown:
    get:
      operationId: getReportPaymentTypeBreakdown
      tags: [reports]
      summary: Sales breakdown by payment type (contado vs credito)
      responses:
        "200":
          description: Payment type breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentTypePoint"

  /reports/top-products:
    get:
      operationId: getReportTopProducts
      tags: [reports]
      summary: Top selling products overall
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  # ─── SETTINGS ────────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /inventory-entries:
    post:
      operationId: createInventoryEntry
      tags: [inventory]
      summary: Receive a batch of merchandise items and update stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryEntryBatchInput"
      responses:
        "201":
          description: Created entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryEntry"
    get:
      operationId: listInventoryEntries
      tags: [inventory]
      summary: List inventory entries
      parameters:
        - name: productId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of inventory entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── AUTH ────────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthToken:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ─── USER ────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, cajero]
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [email, name, role, password]
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, cajero]
        password:
          type: string

    UserUpdate:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, cajero]
        password:
          type: string

    # ─── PRODUCT VARIANT ─────────────────────────────────────────────────────
    ProductVariant:
      type: object
      required: [id, productId, color, size, sku, stock, images, createdAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        color:
          type: string
        size:
          type: string
        sku:
          type: string
        stock:
          type: integer
        images:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    ProductVariantInput:
      type: object
      required: [color]
      properties:
        color:
          type: string
        size:
          type: string
          nullable: true
          description: Opcional. Dejar vacío para variantes sin talla (ej. accesorios).
        sku:
          type: string
          description: Auto-generated if not provided (CODE-COLOR-SIZE)
        stock:
          type: integer
        images:
          type: array
          items:
            type: string

    ProductVariantUpdate:
      type: object
      properties:
        color:
          type: string
        size:
          type: string
          nullable: true
          description: Dejar null para quitar la talla.
        sku:
          type: string
        stock:
          type: integer
        images:
          type: array
          items:
            type: string

    # ─── PRODUCT ─────────────────────────────────────────────────────────────
    Product:
      type: object
      required: [id, code, name, costPrice, salePrice, stock, category, images, isVisible, createdAt, variants]
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        costPrice:
          type: number
        salePrice:
          type: number
        stock:
          type: integer
        category:
          type: string
          enum: [blusas, jeans, vestidos, conjuntos, faldas, chaquetas, zapatos, bolsos, accesorios]
        images:
          type: array
          items:
            type: string
        isVisible:
          type: boolean
          description: Whether the product is shown in the public catalog
        createdAt:
          type: string
          format: date-time
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"

    ProductInput:
      type: object
      required: [name, costPrice, salePrice, stock, category]
      properties:
        name:
          type: string
        description:
          type: string
        costPrice:
          type: number
        salePrice:
          type: number
        stock:
          type: integer
        category:
          type: string
          enum: [blusas, jeans, vestidos, conjuntos, faldas, chaquetas, zapatos, bolsos, accesorios]
        images:
          type: array
          items:
            type: string
        isVisible:
          type: boolean
          description: Whether the product is shown in the public catalog

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        costPrice:
          type: number
        salePrice:
          type: number
        stock:
          type: integer
        category:
          type: string
          enum: [blusas, jeans, vestidos, conjuntos, faldas, chaquetas, zapatos, bolsos, accesorios]
        images:
          type: array
          items:
            type: string
        isVisible:
          type: boolean
          description: Whether the product is shown in the public catalog

    ProductVisibilityInput:
      type: object
      required: [isVisible]
      properties:
        isVisible:
          type: boolean

    ProductMovementIn:
      type: object
      required: [id, purchaseOrderId, supplierName, qtyOrdered, qtyReceived, unitCost, date]
      properties:
        id:
          type: integer
        purchaseOrderId:
          type: integer
        supplierName:
          type: string
        qtyOrdered:
          type: integer
        qtyReceived:
          type: integer
        unitCost:
          type: number
        date:
          type: string
          format: date-time

    ProductMovementOut:
      type: object
      required: [id, saleId, customerName, qty, unitPrice, date]
      properties:
        id:
          type: integer
        saleId:
          type: integer
        customerName:
          type: string
        qty:
          type: integer
        unitPrice:
          type: number
        date:
          type: string
          format: date-time

    ProductMovements:
      type: object
      required: [incoming, outgoing]
      properties:
        incoming:
          type: array
          items:
            $ref: "#/components/schemas/ProductMovementIn"
        outgoing:
          type: array
          items:
            $ref: "#/components/schemas/ProductMovementOut"

    # ─── CUSTOMER ────────────────────────────────────────────────────────────
    Customer:
      type: object
      required: [id, cedula, firstName, lastName, createdAt]
      properties:
        id:
          type: integer
        cedula:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    CustomerInput:
      type: object
      required: [cedula, firstName, lastName]
      properties:
        cedula:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string

    CustomerUpdate:
      type: object
      properties:
        cedula:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string

    # ─── SUPPLIER ────────────────────────────────────────────────────────────
    Supplier:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        contact:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    SupplierInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        contact:
          type: string
        email:
          type: string
        phone:
          type: string

    SupplierUpdate:
      type: object
      properties:
        name:
          type: string
        contact:
          type: string
        email:
          type: string
        phone:
          type: string

    # ─── PURCHASE ORDER ──────────────────────────────────────────────────────
    PurchaseOrderItem:
      type: object
      required: [id, productId, productName, qtyOrdered, qtyReceived, unitCost]
      properties:
        id:
          type: integer
        productId:
          type: integer
        variantId:
          type: ["integer", "null"]
        productName:
          type: string
        description:
          type: ["string", "null"]
        salePrice:
          type: ["number", "null"]
        variantColor:
          type: ["string", "null"]
        variantSize:
          type: ["string", "null"]
        variantSku:
          type: ["string", "null"]
        qtyOrdered:
          type: integer
        qtyReceived:
          type: integer
        unitCost:
          type: number

    PurchaseOrderItemInput:
      type: object
      required: [productId, qtyOrdered, unitCost]
      properties:
        productId:
          type: integer
        variantId:
          type: integer
          description: Required when the product has variants
        qtyOrdered:
          type: integer
        unitCost:
          type: number

    PurchaseOrder:
      type: object
      required: [id, supplierId, supplierName, paymentType, status, total, items, createdAt]
      properties:
        id:
          type: integer
        supplierId:
          type: integer
        supplierName:
          type: string
        guideNumber:
          type: ["string", "null"]
        paymentType:
          type: string
          enum: [contado, credito]
        status:
          type: string
          enum: [pending, partial, received, cancelled]
        total:
          type: number
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrderItem"
        createdAt:
          type: string
          format: date-time

    PurchaseOrderInput:
      type: object
      required: [supplierId, paymentType, items]
      properties:
        supplierId:
          type: integer
        guideNumber:
          type: string
        paymentType:
          type: string
          enum: [contado, credito]
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrderItemInput"

    PurchaseOrderUpdate:
      type: object
      properties:
        guideNumber:
          type: string
        supplierId:
          type: integer
        paymentType:
          type: string
          enum: [contado, credito]
        status:
          type: string
          enum: [pending, partial, received, cancelled]
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrderItemInput"

    ReceiveItemInput:
      type: object
      required: [purchaseOrderItemId, qtyReceived]
      properties:
        purchaseOrderItemId:
          type: integer
        qtyReceived:
          type: integer
        salePrice:
          type: number

    ReceiveOrderInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReceiveItemInput"

    # ─── ACCOUNTS PAYABLE ────────────────────────────────────────────────────
    LedgerPayment:
      type: object
      required: [id, amount, paidAt]
      properties:
        id:
          type: integer
        amount:
          type: number
        notes:
          type: ["string", "null"]
        paidAt:
          type: string
          format: date-time

    AccountPayable:
      type: object
      required: [id, type, totalAmount, paidAmount, status, payments, createdAt]
      properties:
        id:
          type: integer
        purchaseOrderId:
          type: ["integer", "null"]
        type:
          type: string
          enum: [purchase_order, fixed_expense, inventory_entry]
        description:
          type: ["string", "null"]
        supplierName:
          type: ["string", "null"]
        guideNumber:
          type: ["string", "null"]
        totalAmount:
          type: number
        paidAmount:
          type: number
        dueDate:
          type: ["string", "null"]
          format: date
        status:
          type: string
          enum: [pending, partial, paid]
        payments:
          type: array
          items:
            $ref: "#/components/schemas/LedgerPayment"
        createdAt:
          type: string
          format: date-time

    AccountPayableStatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending]
        dueDate:
          type: string
          format: date
          nullable: true

    FixedExpenseInput:
      type: object
      required: [description, totalAmount]
      properties:
        description:
          type: string
        totalAmount:
          type: number
        dueDate:
          type: string
          format: date

    # ─── SALE ────────────────────────────────────────────────────────────────
    SaleItem:
      type: object
      required: [id, productId, productName, qty, unitPrice, subtotal]
      properties:
        id:
          type: integer
        productId:
          type: integer
        variantId:
          type: ["integer", "null"]
        productName:
          type: string
        description:
          type: ["string", "null"]
        variantColor:
          type: ["string", "null"]
        variantSize:
          type: ["string", "null"]
        variantSku:
          type: ["string", "null"]
        qty:
          type: integer
        unitPrice:
          type: number
        subtotal:
          type: number

    SaleItemInput:
      type: object
      required: [productId, qty, unitPrice]
      properties:
        productId:
          type: integer
        variantId:
          type: integer
          description: Required when the product has variants
        qty:
          type: integer
        unitPrice:
          type: number

    Sale:
      type: object
      required: [id, userId, paymentType, total, voided, items, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        customerCedula:
          type: ["string", "null"]
        customerEmail:
          type: ["string", "null"]
        customerPhone:
          type: ["string", "null"]
        paymentType:
          type: string
          enum: [efectivo, credito, datafono, link]
        total:
          type: number
        notes:
          type: ["string", "null"]
        paymentLink:
          type: ["string", "null"]
          description: Bold payment link URL (only present when withBoldLink was requested)
        boldFee:
          type: ["number", "null"]
          description: Bold transaction fee in COP
        boldPaymentStatus:
          type: ["string", "null"]
          enum: [pending, paid, failed, expired]
          description: Status of the Bold payment link (updated via webhook)
        voided:
          type: boolean
        voidedAt:
          type: ["string", "null"]
          format: date-time
        voidReason:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
        createdAt:
          type: string
          format: date-time

    UpdateSalePaymentTypeInput:
      type: object
      required: [paymentType]
      properties:
        paymentType:
          type: string
          enum: [efectivo, datafono, link]

    VoidSaleInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    SaleInput:
      type: object
      required: [paymentType, items]
      properties:
        customerId:
          type: integer
        paymentType:
          type: string
          enum: [efectivo, credito, datafono, link]
        notes:
          type: string
        advanceAmount:
          type: number
        chargedAmount:
          type: number
          description: Gross amount charged to the customer after surcharges (used for Bold link generation on 'link' payment type)
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItemInput"

    # ─── ACCOUNTS RECEIVABLE ─────────────────────────────────────────────────
    AccountReceivable:
      type: object
      required: [id, saleId, customerName, totalAmount, paidAmount, status, payments, createdAt]
      properties:
        id:
          type: integer
        saleId:
          type: integer
        customerId:
          type: ["integer", "null"]
        customerName:
          type: string
        totalAmount:
          type: number
        paidAmount:
          type: number
        advanceAmount:
          type: number
        dueDate:
          type: ["string", "null"]
          format: date
        status:
          type: string
          enum: [pending, partial, paid]
        payments:
          type: array
          items:
            $ref: "#/components/schemas/LedgerPayment"
        createdAt:
          type: string
          format: date-time

    # ─── SHARED ──────────────────────────────────────────────────────────────
    PaymentInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
        notes:
          type: string

    # ─── DASHBOARD ───────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalBilling, totalCollection, newCustomers, totalSales, lowStockProducts, netProfit, pendingCredits]
      properties:
        totalBilling:
          type: number
        totalCollection:
          type: number
        newCustomers:
          type: integer
        totalSales:
          type: integer
        lowStockProducts:
          type: integer
        netProfit:
          type: number
        pendingCredits:
          type: number

    BillingVsCollectionPoint:
      type: object
      required: [month, billing, collection]
      properties:
        month:
          type: string
        billing:
          type: number
        collection:
          type: number

    TopProduct:
      type: object
      required: [productId, productName, category, totalQty, totalRevenue]
      properties:
        productId:
          type: integer
        variantId:
          type: ["integer", "null"]
        productName:
          type: string
        category:
          type: string
        color:
          type: ["string", "null"]
        size:
          type: ["string", "null"]
        sku:
          type: ["string", "null"]
        totalQty:
          type: integer
        totalRevenue:
          type: number

    InventoryCostPoint:
      type: object
      required: [category, totalCost, totalUnits]
      properties:
        category:
          type: string
        totalCost:
          type: number
        totalUnits:
          type: integer

    ExpensesVsIncomePoint:
      type: object
      required: [month, expenses, income]
      properties:
        month:
          type: string
        expenses:
          type: number
        income:
          type: number

    # ─── REPORTS ─────────────────────────────────────────────────────────────
    SalesByMonthPoint:
      type: object
      required: [month, total, count]
      properties:
        month:
          type: string
        total:
          type: number
        count:
          type: integer

    SalesByCategoryPoint:
      type: object
      required: [category, total, count]
      properties:
        category:
          type: string
        total:
          type: number
        count:
          type: integer

    PaymentTypePoint:
      type: object
      required: [paymentType, total, count]
      properties:
        paymentType:
          type: string
        total:
          type: number
        count:
          type: integer

    NetProfitTrendPoint:
      type: object
      required: [month, netProfit, income, expenses]
      properties:
        month:
          type: string
        netProfit:
          type: number
        income:
          type: number
        expenses:
          type: number

    SlowMovingProduct:
      type: object
      required: [id, name, code, category, stock, daysInStock, saleCount]
      properties:
        id:
          type: integer
        variantId:
          type: ["integer", "null"]
        name:
          type: string
        code:
          type: string
        category:
          type: string
        color:
          type: ["string", "null"]
        size:
          type: ["string", "null"]
        sku:
          type: ["string", "null"]
        stock:
          type: integer
        daysInStock:
          type: number
        daysSinceLastSale:
          type: ["number", "null"]
        lastSaleAt:
          type: ["string", "null"]
          format: date-time
        saleCount:
          type: integer

    # ─── SETTINGS ────────────────────────────────────────────────────────────
    Settings:
      type: object
      required: [id, storeName]
      properties:
        id:
          type: integer
        storeName:
          type: string
        storeEmail:
          type: ["string", "null"]
        storePhone:
          type: ["string", "null"]
        storeAddress:
          type: ["string", "null"]
        smtpHost:
          type: ["string", "null"]
        smtpPort:
          type: ["integer", "null"]
        smtpUser:
          type: ["string", "null"]
        smtpPass:
          type: ["string", "null"]
        smtpFrom:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        primaryColor:
          type: ["string", "null"]
        instagramUrl:
          type: ["string", "null"]
        tiktokUrl:
          type: ["string", "null"]
        sendInvoiceEmail:
          type: boolean
        sendPaymentLinkEmail:
          type: boolean

    SettingsInput:
      type: object
      properties:
        storeName:
          type: string
        storeEmail:
          type: string
        storePhone:
          type: string
        storeAddress:
          type: string
        smtpHost:
          type: string
        smtpPort:
          type: integer
        smtpUser:
          type: string
        smtpPass:
          type: string
        smtpFrom:
          type: string
        logoUrl:
          type: string
        primaryColor:
          type: string
        instagramUrl:
          type: string
        tiktokUrl:
          type: string
        sendInvoiceEmail:
          type: boolean
        sendPaymentLinkEmail:
          type: boolean

    # ─── INVENTORY ENTRIES ────────────────────────────────────────────────────
    InventoryEntryBatchInput:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InventoryEntryInput"

    InventoryEntryInput:
      type: object
      required: [productId, qty, unitCost]
      properties:
        productId:
          type: integer
        variantId:
          type: integer
          nullable: true
        supplierId:
          type: integer
          nullable: true
        qty:
          type: integer
          minimum: 1
        unitCost:
          type: number
        salePrice:
          type: number
          nullable: true
        paymentStatus:
          type: string
          enum: [paid, pending]
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        notes:
          type: string

    InventoryEntry:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        variantId:
          type: integer
          nullable: true
        supplierId:
          type: integer
          nullable: true
        qty:
          type: integer
        unitCost:
          type: number
        totalCost:
          type: number
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
